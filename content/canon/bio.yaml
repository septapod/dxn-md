summary: >-
  Brent Dixon offers strategic facilitation for credit unions in the age of
  agentic AI. He works with credit union CEOs and boards on strategy that
  holds up when it meets reality.
narrative:
  - >-
    Brent Dixon is a strategic facilitator based in Oakland, California. He
    founded Dixon Strategic Labs in 2022 after twenty years working alongside
    communities and cooperatives, co-designing the systems, gatherings, and
    tools they use to do their work together.
  - >-
    Brent thinks like a designer, which means he takes complex strategy work
    and makes it clear, usable, and built for the people who have to live with
    it. He is also a futurist whose practice covers AI, open banking,
    stablecoins, emerging technology, experimentation, and strategic foresight.
    He lives in Oakland, California with his son and a bossy cat named Bug.
